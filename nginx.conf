events {
    worker_connections 1024;
}

http {

    client_max_body_size 200M;

    upstream app {
        server app:8080;
    }

    upstream grafana {
        server grafana:3000;
    }

    server {
        listen 80;
        server_name _;

        #
        # Spring Boot
        #
        location / {
            proxy_pass http://app;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        #
        # Grafana
        #
        location /grafana/ {

            auth_request /internal/grafana-access-check;
            error_page 401 = @login_redirect;
            error_page 403 = @forbidden_redirect;

            proxy_pass http://grafana; # <-- НЕ СТАВЬ СЛЕШ НА КОНЦЕ

            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location = /internal/grafana-access-check {
            internal;

            proxy_pass http://app/internal/visualizer-access;

            proxy_pass_request_body off;
            proxy_set_header Content-Length "";

            proxy_set_header Cookie $http_cookie;
            proxy_set_header Authorization $http_authorization;

            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Host $host;
        }

        location @login_redirect {
            return 302 /login;
        }

        location @forbidden_redirect {
            return 302 /forbidden;
        }
    }
}