services:

  nginx:
    image: nginx:alpine
    container_name: file-bridge-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [ app, grafana ]
    networks: [ backend, monitoring ]
    restart: unless-stopped

  app:
    build: .
    container_name: file-bridge-app-container
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      API_BASE_URL: ${API_BASE_URL}
      GRAFANA_URL: ${GRAFANA_URL}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      MINIO_HOST: minio
      MINIO_PORT: 9000
    volumes:
      - app_logs:/var/log/app
    networks:
      - backend
      - monitoring

  # ================== Data ==================
  postgres:
    image: postgres:16.1-alpine
    container_name: postgres-db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "sh", "-c", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} && psql -U postgres -c 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 3

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - backend
    env_file:
      - .env
    entrypoint: >
      /bin/sh -c "
      echo 'Configuring MinIO...';
      mc alias set file-storage http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY};
      
      echo 'Creating bucket:' ${MINIO_FILE_BUCKET};
      mc mb file-storage/${MINIO_FILE_BUCKET} && echo 'Created' || echo 'Already exists';
      mc anonymous set none file-storage/${MINIO_FILE_BUCKET};

      mc ls file-storage;

      echo 'Done';
      "

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: minio-storage
    restart: always
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data
    volumes:
      - minio_data:/data
    networks:
      - backend
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      start_period: 20s
      retries: 3

  # ================== Observability ==================

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./observability/prod/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped
    networks: [ monitoring ]
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy" ]
      interval: 30s
      timeout: 10s
      retries: 3

  loki:
    image: grafana/loki:2.9.0
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./observability/prod/loki-config.yml:/etc/loki/loki-config.yml
      - loki_data:/loki
    user: "10001:10001"
    networks: [ monitoring ]
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:3100/healthy" ]
      interval: 30s
      timeout: 10s
      retries: 3

  promtail:
    image: grafana/promtail:2.9.0
    volumes:
      - ./observability/prod/promtail-config.yml:/etc/promtail/config.yml
      - app_logs:/var/log/app:ro
    command: -config.file=/etc/promtail/config.yml
    networks: [ monitoring ]
    depends_on: [ loki ]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    networks: [ backend, monitoring ]
    depends_on: [ prometheus, loki ]
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  app_logs:
  postgres_data:
  minio_data:
  prometheus_data:
  loki_data:
  grafana_data:

networks:
  backend:
    driver: bridge
  monitoring:
    driver: bridge