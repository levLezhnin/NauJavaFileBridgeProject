services:
  app:
    build: .
    container_name: file-bridge-app-container
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      MINIO_HOST: minio
      MINIO_PORT: 9000
    ports:
      - "8080:8080"
    networks:
      - backend
  postgres:
    image: postgres:16.1-alpine
    container_name: postgres-db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "sh", "-c", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} && psql -U postgres -c 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 3

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - backend
    env_file:
      - .env
    entrypoint: >
      /bin/sh -c "
      echo 'Configuring MinIO...';
      mc alias set file-storage http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY};
      
      echo 'Creating bucket:' ${MINIO_FILE_BUCKET};
      mc mb file-storage/${MINIO_FILE_BUCKET} && echo 'Created' || echo 'Already exists';
      mc anonymous set none file-storage/${MINIO_FILE_BUCKET};
      
      echo 'Creating bucket:' ${MINIO_REPORT_BUCKET};
      mc mb file-storage/${MINIO_REPORT_BUCKET} && echo 'Created' || echo 'Already exists';
      mc anonymous set none file-storage/${MINIO_REPORT_BUCKET};

      mc ls file-storage;

      echo 'Done';
      "

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: minio-storage
    restart: always
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data
    volumes:
      - minio_data:/data
    networks:
      - backend
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      start_period: 20s
      retries: 3

volumes:
  postgres_data:
  minio_data:
networks:
  backend:
    driver: bridge