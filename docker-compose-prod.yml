services:
  app:
    build: .
    container_name: file-bridge-app-container
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      POSTGRES_HOST: postgres
    ports:
      - "8080:8080"
    networks:
      - backend
  postgres:
    image: postgres:latest
    container_name: postgres-db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "sh", "-c", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} && psql -U postgres -c 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  postgres_data:
networks:
  backend: