spring:
  config:
    activate:
      on-profile: prod
  jpa:
    hibernate:
      ddl-auto: validate
  datasource:
    hikari:
      maximum-pool-size: 30
      minimum-idle: 15
      connection-timeout: 30_000
      idle-timeout: 30_000

minio:
  connection:
    connect-timeout: 10s
    write-timeout: 30s
    read-timeout: 30s
    max-idle-connections: 50
    keep-alive-duration: 5m

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized