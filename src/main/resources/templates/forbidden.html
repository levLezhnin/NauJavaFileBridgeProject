<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Доступ запрещён | File Bridge</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main class="page-shell error-shell">
    <section class="error-card">
        <div>
            <p class="eyebrow">403</p>
            <h1>Доступ запрещён</h1>
            <p>У вас нет прав для просмотра этого ресурса. Если вы уверены, что должны иметь доступ, войдите заново.</p>
            <div class="hero-actions">
                <a th:href="@{/login}" class="btn btn-primary">Войти</a>
                <a th:href="@{/}" class="btn btn-secondary">На главную</a>
            </div>
        </div>
    </section>
</main>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
