<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Доступ запрещён | File Bridge</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main class="page-shell error-shell">
    <section class="error-card">
        <div>
            <p class="eyebrow">403</p>
            <h1>Доступ запрещён</h1>
            <p id="forbiddenMessage" class="forbidden-description">У вас нет прав для просмотра этого ресурса.</p>
        </div>
    </section>
</main>
<script th:src="@{/js/app.js}"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('ban') === 'true') {
        const reason = urlParams.get('reason');
        const bannedAt = urlParams.get('bannedAt');
        const admin = urlParams.get('admin');
        const messageEl = document.getElementById('forbiddenMessage');
        messageEl.innerHTML = `
            <div class="ban-info">
                <p class="ban-title">Ваш аккаунт заблокирован</p>
                <div class="ban-details">
                    <div class="ban-detail">
                        <span class="detail-label">Причина:</span>
                        <span class="detail-value">${reason}</span>
                    </div>
                    <div class="ban-detail">
                        <span class="detail-label">Дата блокировки:</span>
                        <span class="detail-value">${new Date(bannedAt).toLocaleString()}</span>
                    </div>
                    <div class="ban-detail">
                        <span class="detail-label">Администратор:</span>
                        <span class="detail-value">${admin}</span>
                    </div>
                </div>
            </div>
        `;
    }
});
</script>
</body>
</html>
