<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Поиск файлов | File Bridge</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/alerts :: alerts}"></div>
<div th:replace="~{fragments/modal :: modal}"></div>
<main class="page-shell list-shell full-width">
    <section class="list-header">
        <div>
            <p class="eyebrow">Администрирование</p>
            <h1>Поиск файлов в системе</h1>
        </div>
        <form id="searchForm" class="search-form">
            <select id="searchBy" name="searchBy">
                <option value="all">Все файлы</option>
                <option value="authorId">По ID автора</option>
                <option value="authorUsername">По имени автора (содержит)</option>
                <option value="fileNameContains">По имени файла (содержит)</option>
                <option value="uploadedAfter">Загружен после даты</option>
                <option value="uploadedBefore">Загружен до даты</option>
            </select>
            <input type="text" id="searchValue" name="searchValue" placeholder="Введите значение для поиска" />
            <button type="submit" class="btn btn-primary">Поиск</button>
        </form>
    </section>
    <section class="table-card">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Имя файла</th>
                <th>Автор</th>
                <th>Загружен</th>
                <th>Истекает</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody id="filesTableBody">
            </tbody>
        </table>
        <div class="pagination-controls">
            <button id="prevBtn" class="btn btn-secondary" disabled>Предыдущая</button>
            <span id="pageInfo">Страница 1</span>
            <button id="nextBtn" class="btn btn-secondary">Следующая</button>
        </div>
    </section>
</main>
<script th:src="@{/js/app.js}"></script>
<script>
let currentFileId = null;
let currentPage = 0;
let currentSearchBy = 'all';
let currentSearch = '';
const pageSize = 50;

function formatDate(dateStr) {
    if (!dateStr) return '—';
    try {
        return new Date(dateStr).toLocaleString('ru-RU');
    } catch (e) {
        return dateStr;
    }
}

function loadFiles() {
    apiFetch(`/api/v1/admin/files?searchBy=${currentSearchBy}&search=${encodeURIComponent(currentSearch)}&page_size=${pageSize}&page=${currentPage}`)
        .then(files => {
            const tbody = document.getElementById('filesTableBody');
            tbody.innerHTML = '';
            if (!files || files.length === 0) {
                const row = document.createElement('tr');
                row.innerHTML = '<td colspan="6">Файлы не найдены по заданным критериям</td>';
                tbody.appendChild(row);
            } else {
                files.forEach(file => {
                    const shortId = file.id ? file.id.substring(0, 8) + '…' : '—';
                    const upload = formatDate(file.upload_date);
                    const expire = formatDate(file.expire_date);
                    const safeFileName = (file.file_name || '').replace(/"/g, '&quot;').replace(/'/g, '&apos;');
                    const fileJson = JSON.stringify(file).replace(/"/g, '&quot;').replace(/'/g, '&apos;');
                    const row = document.createElement('tr');
                    row.innerHTML = '<td title="' + (file.id || '') + '">' + shortId + '</td>' +
                        '<td>' + (file.file_name || '—') + '</td>' +
                        '<td>' + (file.author_username || '—') + ' (ID=' + (file.author_id || '?') + ')</td>' +
                        '<td>' + upload + '</td>' +
                        '<td>' + expire + '</td>' +
                        '<td>' +
                        '<button class="btn btn-secondary btn-sm" data-file="' + fileJson + '" onclick="openFileDetailsModal(this)">Подробнее</button> ' +
                        '<button class="btn btn-danger btn-sm" data-file-id="' + (file.id || '') + '" data-file-name="' + safeFileName + '" onclick="openDeleteConfirmModal(this)">Удалить</button>' +
                        '</td>';
                    tbody.appendChild(row);
                });
            }
            document.getElementById('prevBtn').disabled = currentPage === 0;
            document.getElementById('nextBtn').disabled = files.length < pageSize;
            document.getElementById('pageInfo').textContent = `Страница ${currentPage + 1}`;
        })
        .catch(error => {
            showAlert('Ошибка загрузки файлов: ' + error.message, 'error');
        });
}

function openDeleteConfirmModal(button) {
    currentFileId = button.getAttribute('data-file-id');
    const fileName = button.getAttribute('data-file-name') || currentFileId;
    const modalTitle = document.getElementById('modalTitle');
    const modalBody = document.getElementById('modalBody');
    const modalConfirm = document.getElementById('modalConfirm');
    const modalBackdrop = document.getElementById('modalBackdrop');

    modalTitle.textContent = 'Удалить файл';
    modalBody.innerHTML = `
        <div id="modalError" class="alert alert--error" hidden></div>
        <p>Вы уверены, что хотите <strong>удалить</strong> файл <strong>${fileName}</strong>?</p>
        <p style="color:#b91c1c; font-weight:500;">Это действие необратимо. Файл будет удалён из базы данных и объектного хранилища.</p>
    `;
    modalConfirm.textContent = 'Удалить файл';
    modalConfirm.onclick = submitDeleteFile;

    const modalError = document.getElementById('modalError');
    if (modalError) modalError.hidden = true;
    modalBackdrop.hidden = false;
}

function submitDeleteFile() {
    if (!currentFileId) return;

    apiFetch(`/api/v1/files/${currentFileId}`, {
        method: 'DELETE'
    })
    .then(() => {
        showAlert('Файл успешно удалён', 'success');
        closeModal();
        loadFiles();
    })
    .catch(error => {
        const modalError = document.getElementById('modalError');
        if (modalError) {
            modalError.textContent = error.message || 'Ошибка при удалении файла';
            modalError.hidden = false;
        } else {
            showAlert('Ошибка удаления: ' + (error.message || ''), 'error');
            closeModal();
        }
    });
}

function openFileDetailsModal(button) {
    let file;
    try {
        const raw = button.getAttribute('data-file');
        const jsonStr = raw.replace(/&quot;/g, '"').replace(/&apos;/g, "'");
        file = JSON.parse(jsonStr);
    } catch (e) {
        showAlert('Не удалось прочитать данные файла', 'error');
        return;
    }

    const modalTitle = document.getElementById('modalTitle');
    const modalBody = document.getElementById('modalBody');
    const modalConfirm = document.getElementById('modalConfirm');
    const modalBackdrop = document.getElementById('modalBackdrop');

    modalTitle.textContent = 'Подробная информация о файле';

    const modalFooter = modalBackdrop.querySelector('.modal-footer');
    if (modalFooter) {
        modalFooter.style.display = 'none';
    }

    const hasPass = file.has_password ? 'Да' : 'Нет';
    const storageClass = '';

    const sizeBytes = file.file_size_bytes != null ? file.file_size_bytes : 0;
    const sizeMb = (sizeBytes / (1024 * 1024)).toFixed(2);
    const sizeText = `${sizeMb} МБ (${sizeBytes} байт)`;

    const details = `
        <div id="modalError" class="alert alert--error" hidden></div>
        <div class="ban-details-modal">
            <div class="ban-detail-modal"><span class="detail-label-modal">ID файла:</span><span class="detail-value-modal">${file.id}</span></div>
            <div class="ban-detail-modal"><span class="detail-label-modal">Имя файла:</span><span class="detail-value-modal">${file.file_name || '—'}</span></div>
            <div class="ban-detail-modal"><span class="detail-label-modal">MIME-тип:</span><span class="detail-value-modal">${file.mime_type || '—'}</span></div>
            <div class="ban-detail-modal"><span class="detail-label-modal">Автор:</span><span class="detail-value-modal">${file.author_username || '—'} (ID ${file.author_id})</span></div>
            <div class="ban-detail-modal"><span class="detail-label-modal">Размер:</span><span class="detail-value-modal">${sizeText}</span></div>
            <div class="ban-detail-modal"><span class="detail-label-modal">Дата загрузки:</span><span class="detail-value-modal">${formatDate(file.upload_date)}</span></div>
            <div class="ban-detail-modal"><span class="detail-label-modal">Дата истечения:</span><span class="detail-value-modal">${formatDate(file.expire_date)}</span></div>
            <div class="ban-detail-modal"><span class="detail-label-modal">Скачиваний:</span><span class="detail-value-modal">${file.times_downloaded} / ${file.max_downloads}</span></div>
            <div class="ban-detail-modal"><span class="detail-label-modal">Защищён паролем:</span><span class="detail-value-modal">${hasPass}</span></div>
        </div>
    `;
    modalBody.innerHTML = details;
    modalConfirm.style.display = 'none';
    document.getElementById('modalCancel').style.display = 'none';
    modalBackdrop.hidden = false;
}

function closeModal() {
    const modalBackdrop = document.getElementById('modalBackdrop');
    const modalPanel = modalBackdrop.querySelector('.modal-panel');
    const modalConfirm = document.getElementById('modalConfirm');
    const modalCancel = document.getElementById('modalCancel');

    const modalFooter = modalBackdrop.querySelector('.modal-footer');
    if (modalFooter) {
        modalFooter.style.display = '';   // возвращаем управление CSS
    }

    modalConfirm.style.display = 'block';
    modalCancel.style.display = 'block';
    modalConfirm.onclick = null;
    modalBackdrop.hidden = true;
    currentFileId = null;
}

document.addEventListener('DOMContentLoaded', function() {
    loadFiles();

    document.getElementById('searchForm').addEventListener('submit', function(e) {
        e.preventDefault();
        currentSearchBy = document.getElementById('searchBy').value;
        currentSearch = document.getElementById('searchValue').value.trim();
        currentPage = 0;
        loadFiles();
    });

    document.getElementById('prevBtn').addEventListener('click', () => {
        if (currentPage > 0) {
            currentPage--;
            loadFiles();
        }
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
        currentPage++;
        loadFiles();
    });

    const modalClose = document.getElementById('modalClose');
    const modalCancel = document.getElementById('modalCancel');
    const modalBackdrop = document.getElementById('modalBackdrop');

    modalClose.addEventListener('click', closeModal);
    modalCancel.addEventListener('click', closeModal);
    modalBackdrop.addEventListener('click', function(e) {
        if (e.target === modalBackdrop) {
            closeModal();
        }
    });
});
</script>
</body>
</html>
