<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Загрузка файла | File Bridge</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main class="page-shell upload-shell">
    <section class="upload-panel">
        <div class="panel-header">
            <p class="eyebrow">Загрузка</p>
            <h1>Отправьте файл в облако</h1>
            <p>Выберите файл, настройте срок и количество загрузок.</p>
        </div>
        <div th:replace="~{fragments/alerts :: alerts}"></div>
        <form id="uploadForm" class="form-card" novalidate>
            <label class="dropzone" for="fileInput" id="dropzone">
                <input id="fileInput" name="file" type="file" hidden />
                <span>Перетащите файл или нажмите, чтобы выбрать.</span>
            </label>
            <div class="form-row">
                <div class="form-group">
                    <label for="ttl">Срок жизни (часы)</label>
                    <input id="ttl" name="ttl" type="number" min="1" max="720" value="24" />
                </div>
                <div class="form-group">
                    <label for="maxDownloads">Максимум скачиваний</label>
                    <input id="maxDownloads" name="maxDownloads" type="number" min="1" max="1000" value="10" />
                </div>
            </div>
            <div class="form-group">
                <label for="password">Пароль (необязательно)</label>
                <input id="password" name="password" type="password" autocomplete="new-password" />
            </div>
            <button type="submit" class="btn btn-primary">Загрузить</button>
            <p class="form-note">Если файл требует пароля при скачивании, укажите его здесь.</p>
        </form>
    </section>
</main>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
