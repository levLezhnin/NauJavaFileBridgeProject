<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Скачать файл | File Bridge</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main class="page-shell download-shell">
    <section class="download-card">
        <div>
            <p class="eyebrow">Скачать файл</p>
            <h1>Запрос на загрузку</h1>
            <div id="fileInfo" class="file-info">
                <p>Загрузка информации о файле...</p>
            </div>
        </div>
        <div th:replace="~{fragments/alerts :: alerts}"></div>
        <form id="downloadForm" class="form-card" novalidate>
            <input type="hidden" id="fileId" th:value="${fileId}" />
            <div class="form-group">
                <label for="downloadPassword">Пароль</label>
                <input id="downloadPassword" name="password" type="password" autocomplete="current-password" placeholder="Оставьте пустым, если пароля нет" />
            </div>
            <button type="submit" class="btn btn-primary">⬇️ Скачать</button>
            <div id="downloadProgress" class="progress-container" style="display: none; margin-top: 1rem;">
                <div class="progress-wrapper">
                    <div class="progress-bar" style="width: 0%"></div>
                </div>
                <p class="progress-text">0%</p>
            </div>
            <p class="form-note">💡 Если для этого файла установлен пароль, введите его. Иначе просто нажмите кнопку «Скачать». <br> Загруженный файл сохранится в вашу папку загрузок.</p>
        </form>
    </section>
</main>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
