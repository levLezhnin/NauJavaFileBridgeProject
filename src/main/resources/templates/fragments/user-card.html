<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Card Fragment</title>
</head>
<body>
<div th:fragment="user-card(user)" class="card user-card">
    <div class="user-info">
        <h3 th:text="${user.username}" class="user-name"></h3>
        <p><strong>ID:</strong> <span th:text="${user.id}"></span></p>
        <p><strong>Email:</strong> <span th:text="${user.email}"></span></p>
        <p><strong>Role:</strong> <span th:text="${user.role.name()}"></span></p>
        <p><strong>Status:</strong>
            <span th:class="${user.isActive} ? 'status-active' : 'status-inactive'"
                  th:text="${user.isActive} ? 'Active' : 'Inactive'"></span>
        </p>
    </div>
    <div class="user-actions">
        <button class="btn btn-secondary" aria-label="Edit user">Edit</button>
        <button class="btn btn-danger" aria-label="Ban user" th:if="${user.isActive}">Ban</button>
        <button class="btn btn-primary" aria-label="Unban user" th:if="${!user.isActive}">Unban</button>
    </div>
</div>
</body>
</html>
