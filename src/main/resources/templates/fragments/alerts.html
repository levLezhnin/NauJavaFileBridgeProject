<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Alert Fragment</title>
</head>
<body>
<div th:fragment="alert(error)" class="alert alert-error" th:if="${error}">
    <span th:text="${error}"></span>
</div>
<div th:fragment="alert(success)" class="alert alert-success" th:if="${success}">
    <span th:text="${success}"></span>
</div>
</body>
</html>
