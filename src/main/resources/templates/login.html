<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Вход | File Bridge</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main class="page-shell auth-shell">
    <section class="auth-panel">
        <div class="auth-header">
            <p class="eyebrow">Вход</p>
            <h1>Авторизация</h1>
            <p>Введите данные, чтобы получить доступ к личной панели.</p>
        </div>
        <div th:replace="~{fragments/alerts :: alerts}"></div>
        <form id="loginForm" class="form-card" novalidate>
            <div class="form-group">
                <label for="loginUsername">Имя пользователя</label>
                <input id="loginUsername" name="username" type="text" required autocomplete="username" />
            </div>
            <div class="form-group">
                <label for="loginPassword">Пароль</label>
                <input id="loginPassword" name="password" type="password" required autocomplete="current-password" />
            </div>
            <button type="submit" class="btn btn-primary">Войти</button>
            <p class="form-note">Ещё нет аккаунта? <a th:href="@{/register}">Зарегистрируйтесь</a></p>
        </form>
    </section>
</main>
<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/auth.js}"></script>
</body>
</html>
