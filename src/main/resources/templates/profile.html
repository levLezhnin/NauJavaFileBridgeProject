<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Профиль | File Bridge</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main class="page-shell profile-shell">
    <section class="profile-card">
        <div>
            <p class="eyebrow">Профиль</p>
            <h1>Ваш аккаунт</h1>
            <p>Управляйте данными профиля и следите за квотой.</p>
        </div>
        <div class="profile-grid">
            <div class="profile-item">
                <h2>Имя пользователя</h2>
                <p id="profileUsername">Загрузка данных...</p>
            </div>
            <div class="profile-item">
                <h2>Квота</h2>
                <p id="profileQuota">Доступные данные появятся здесь после авторизации.</p>
            </div>
            <div class="profile-item">
                <h2>Сброс пароля</h2>
                <p>Функция обновления пароля будет доступна после подключения серверного API.</p>
            </div>
        </div>
    </section>
</main>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
