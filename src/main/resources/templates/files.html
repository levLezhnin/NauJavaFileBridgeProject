<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Файлы | File Bridge</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main class="page-shell dashboard-shell">
    <section class="dashboard-header">
        <div>
            <p class="eyebrow">Мои файлы</p>
            <h1>Панель управления</h1>
            <p id="dashboardSubtitle">Следите за квотой, сроками и загрузками.</p>
        </div>
        <a th:href="@{/upload}" class="btn btn-primary">Загрузить файл</a>
    </section>
    <section class="quota-card">
        <div>
            <h2>Квота</h2>
            <p id="quotaInfo">Загрузка данных происходит через API.</p>
        </div>
        <div class="quota-meta">
            <span>0 / 0</span>
            <span>0 файлов</span>
        </div>
    </section>
    <section class="files-list" id="filesList">
        <div class="empty-state">
            <p class="empty-title">У вас пока нет файлов</p>
            <p class="empty-text">Загрузите файл, чтобы увидеть его здесь.</p>
            <a th:href="@{/upload}" class="btn btn-secondary">Загрузить файл</a>
        </div>
    </section>
</main>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
