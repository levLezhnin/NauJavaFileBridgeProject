<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Файлы | File Bridge</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main class="page-shell dashboard-shell">
    <section class="dashboard-header">
        <div>
            <p class="eyebrow">Мои файлы</p>
            <h1>Панель управления</h1>
            <p id="dashboardSubtitle">Следите за квотой, сроками и загрузками.</p>
        </div>
        <a th:href="@{/upload}" class="btn btn-primary">⬆️ Загрузить файл</a>
    </section>
    <div th:replace="~{fragments/alerts :: alerts}"></div>
    <section class="quota-card">
        <div>
            <h2>Квота</h2>
            <p id="quotaInfo">Загрузка информации из API...</p>
        </div>
        <div class="quota-meta">
            <span id="quotaUsage">0 / 0</span>
            <span id="quotaFiles">0 файлов</span>
        </div>
    </section>
    <section class="files-list" id="filesList">
        <div class="empty-state">
            <p class="empty-title">Загрузка файлов...</p>
        </div>
    </section>
</main>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
