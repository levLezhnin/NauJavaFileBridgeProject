spring:

  application:
    name: file-bridge

  config:
    import: optional:file:.env[.properties]

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: public

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 100

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 200MB
      file-size-threshold: 10MB

  error:
    whitelabel:
      enabled: false

  batch.job.enabled: false

kind: Application

minio:
  url: http://${MINIO_HOST}:${MINIO_PORT}
  accessKey: ${MINIO_ACCESS_KEY}
  secretKey: ${MINIO_SECRET_KEY}

  buckets:
    fileBucket:
      name: ${MINIO_FILE_BUCKET}

app:
  name: File Bridge
  version: 1.0

  api:
    base-url: ${API_BASE_URL}

  grafana:
    url: ${GRAFANA_URL}

  quotas:
    tariffs:
      BASIC:
        maxStorageSize: 1GB

  default:
    default-admin:
      username: ${DEFAULT_ADMIN_USERNAME}
      email: ${DEFAULT_ADMIN_EMAIL}
      password: ${DEFAULT_ADMIN_PASSWORD}
      quota-size: ${DEFAULT_ADMIN_QUOTA_SIZE}

  files:
    cleanup:
      enabled: true
      fetch-size: 100
      skip-limit: 50
      cron: 0 0 3 * * *

jwt:
  accessSecret: ${ACCESS_JWT_SECRET}
  refreshSecret: ${REFRESH_JWT_SECRET}
  accessTokenLifetime: 2h
  refreshTokenLifetime: 14d

cookie:
  path: /
  sameSite: Lax
  secure: false
